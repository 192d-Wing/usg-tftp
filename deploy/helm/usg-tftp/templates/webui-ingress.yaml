{{- if and .Values.webUI.enabled .Values.webUI.ingress.enabled }}
{{- if not .Values.webUI.ingress.host }}{{ fail "webUI.ingress.host is required when ingress is enabled" }}{{ end }}
{{- if .Values.webUI.ingress.passthrough }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "usg-tftp.fullname" . }}-webui
  labels:
    {{- include "usg-tftp.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`{{ .Values.webUI.ingress.host }}`)
      services:
        - name: {{ include "usg-tftp.fullname" . }}-webui
          port: {{ .Values.webUI.service.port }}
          {{- if .Values.webUI.proxyProtocol }}
          proxyProtocol:
            version: 2
          {{- end }}
  tls:
    passthrough: true
{{- else }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "usg-tftp.fullname" . }}-webui
  labels:
    {{- include "usg-tftp.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
  {{- with .Values.webUI.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webUI.ingress.className }}
  ingressClassName: {{ .Values.webUI.ingress.className }}
  {{- end }}
  {{- if .Values.webUI.ingress.tls }}
  tls:
    {{- toYaml .Values.webUI.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.webUI.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "usg-tftp.fullname" . }}-webui
                port:
                  number: {{ .Values.webUI.service.port }}
{{- end }}
{{- end }}
