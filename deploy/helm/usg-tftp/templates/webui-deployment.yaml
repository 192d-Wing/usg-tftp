{{- if .Values.webUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "usg-tftp.fullname" . }}-webui
  labels:
    {{- include "usg-tftp.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  replicas: {{ .Values.webUI.replicaCount }}
  selector:
    matchLabels:
      {{- include "usg-tftp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webui
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "usg-tftp.labels" . | nindent 8 }}
        app.kubernetes.io/component: webui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "usg-tftp.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: webui
          image: "{{ .Values.webUI.image.repository }}:{{ .Values.webUI.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.webUI.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/usg-tftp/tftp.toml"
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
          {{- $tlsEnabled := or (and .Values.webUI.tls.certPath (ne .Values.webUI.tls.certPath "")) .Values.webUI.tls.acmeEnabled }}
          startupProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/status
              port: https
              scheme: {{ if $tlsEnabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          {{- with .Values.webUI.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/usg-tftp
              readOnly: true
            - name: data
              mountPath: {{ .Values.config.rootDir }}
            - name: acme-cache
              mountPath: /var/lib/usg-tftp/acme
            {{- if .Values.webUI.tls.acmeCACert }}
            - name: acme-ca
              mountPath: /etc/usg-tftp/acme-ca
              readOnly: true
            {{- end }}
            - name: logs
              mountPath: /var/log/usg-tftp
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "usg-tftp.fullname" . }}-config
        {{- if .Values.webUI.tls.acmeCACert }}
        - name: acme-ca
          secret:
            secretName: {{ include "usg-tftp.fullname" . }}-acme-ca
        {{- end }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "usg-tftp.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: acme-cache
          {{- if .Values.webUI.acmePersistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "usg-tftp.fullname" . }}-acme-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.webUI.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webUI.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webUI.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
